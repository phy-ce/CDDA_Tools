name: build-recipes-exe

# Push a recipes-v* tag (e.g. git tag recipes-v1 && git push --tags) to build a
# standalone Windows exe for CDDA_Recipes and attach it to that GitHub Release.
on:
  push:
    tags:
      - 'recipes-v*'
  workflow_dispatch:   # or run manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        working-directory: CDDA_Recipes
        run: pyinstaller --onefile --console --name CDDA-Recipes cdda_recipes.py

      - name: Attach exe to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CDDA_Recipes/dist/CDDA-Recipes.exe
